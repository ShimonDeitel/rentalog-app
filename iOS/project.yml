name: Rentalog
options:
  bundleIdPrefix: com.shimondeitel.rentalog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Rentalog:
    type: application
    platform: iOS
    sources:
      - path: Rentalog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rentalog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Rentalog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RentalogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RentalogTests
      - path: Rentalog.storekit
    dependencies:
      - target: Rentalog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rentalog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RentalogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RentalogUITests
    dependencies:
      - target: Rentalog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rentalog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Rentalog:
    build:
      targets:
        Rentalog: all
        RentalogTests: [test]
        RentalogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Rentalog.storekit
    test:
      config: Debug
      storeKitConfiguration: Rentalog.storekit
      targets:
        - RentalogTests
        - RentalogUITests
    archive:
      config: Release
